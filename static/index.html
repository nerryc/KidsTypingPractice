<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Typing Practice</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 24px;
            background-color: #ffe4e1;
            margin: 0;
            padding: 0;
        }
        #typed-sentence span {
            color: black;
        }
        #typed-sentence span.correct {
            color: green;
        }
        #typed-sentence span.incorrect {
            color: red;
        }
        #typing-input, #user-name {
            font-size: 24px;
            padding: 10px;
            margin-top: 20px;
            border: 2px solid #ccc;
            background-color: #fff;
            color: black;
            width: 60%;
            outline: none;
        }
        #typed-sentence {
            min-height: 30px;
            position: relative;
            width: 60%;
            border-bottom: 1px solid black;
            text-align: left;
            margin-top: 20px;
        }
        #feedback, #wpm, #next-button, #score {
            margin: 10px 0;
        }
        #next-button, #start-btn {
            cursor: pointer;
            padding: 5px 10px;
            font-size: 20px;
        }
        #user-info {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #reward-video {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="user-info">
        <input type="text" id="user-name" placeholder="Enter your name" />
        <button id="start-btn">Start</button>
    </div>
    <h1>Typing Practice</h1>
    <div id="score">Score: 0</div>
    <div id="typed-sentence"></div>
    <input type="text" id="typing-input" autocomplete="off" style="display:none;" />
    <div id="feedback"></div>
    <div id="wpm"></div>
    <button id="next-button" style="display:none;">Next</button>
    <video id="reward-video" controls width="320" height="240">
        <source src="" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script>
        let currentSentenceIndex = 0;
        let startTime;
        let score = 0;
        let userName = '';
        let clips = [];
        let completed = false;

        document.getElementById('start-btn').addEventListener('click', function() {
            userName = document.getElementById('user-name').value.trim();
            if (userName) {
                document.getElementById('user-info').style.display = 'none';
                document.getElementById('typing-input').style.display = 'block';
                fetchClips();
                fetchSentence(0);
            } else {
                alert('Please enter your name to start.');
            }
        });

        function fetchClips() {
            fetch('/clips')
                .then(response => response.json())
                .then(data => { clips = data; })
                .catch(error => console.error("Failed to fetch clips:", error));
        }

        function fetchSentence(index) {
            completed = false;
            fetch(`/sentence?index=${index}`)
                .then(response => response.json())
                .then(data => {
                    const sentenceDisplay = document.getElementById('typed-sentence');
                    sentenceDisplay.innerHTML = '';
                    data.sentence.split('').forEach(char => {
                        const charSpan = document.createElement('span');
                        charSpan.textContent = char;
                        sentenceDisplay.appendChild(charSpan);
                    });
                    currentSentenceIndex = parseInt(data.nextIndex, 10);
                    document.getElementById('typing-input').value = '';
                    document.getElementById('typing-input').focus();
                    document.getElementById('next-button').style.display = 'none';
                    document.getElementById('feedback').textContent = '';
                    document.getElementById('wpm').textContent = '';
                    const video = document.getElementById('reward-video');
                    video.pause();
                    video.style.display = 'none';
                    startTime = new Date();
                })
                .catch(error => console.error("Failed to fetch sentence:", error));
        }

        function playRandomClip() {
            if (clips.length === 0) return;
            const videoPath = `./clips/${clips[Math.floor(Math.random() * clips.length)]}`;
            const video = document.getElementById('reward-video');
            video.style.display = 'block';
            video.querySelector('source').src = videoPath;
            video.load();
            video.play().catch(e => console.log("Autoplay prevented:", e.message));
        }

        function updateTypedSentence() {
            if (completed) return;

            const inputField = document.getElementById('typing-input');
            const charSpans = document.getElementById('typed-sentence').childNodes;
            const typedText = inputField.value;
            let allCorrect = true;

            charSpans.forEach((charSpan, index) => {
                if (index < typedText.length) {
                    const correct = typedText[index] === charSpan.textContent;
                    charSpan.className = correct ? 'correct' : 'incorrect';
                    if (!correct) allCorrect = false;
                } else {
                    charSpan.className = '';
                }
            });

            if (allCorrect && typedText.length === charSpans.length) {
                completed = true;
                score++;
                const elapsed = (new Date() - startTime) / 60000;
                const wpm = Math.round((typedText.length / 5) / elapsed);
                document.getElementById('score').textContent = `Score: ${score}`;
                document.getElementById('feedback').textContent = `Well done, ${userName}! 😊`;
                document.getElementById('wpm').textContent = `WPM: ${wpm}`;
                document.getElementById('next-button').style.display = 'block';
                document.getElementById('typing-input').blur();
                playRandomClip();
            }
        }

        document.getElementById('typing-input').addEventListener('input', updateTypedSentence);

        document.getElementById('typing-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && completed) {
                fetchSentence(currentSentenceIndex);
            }
        });

        document.getElementById('next-button').addEventListener('click', function() {
            fetchSentence(currentSentenceIndex);
        });
    </script>
</body>
</html>
